  <style>
    :root {
      --bg-color: #111;
      --bg-secondary: #222;
      --text-primary: #eee;
      --text-secondary: #888;
      --accent-color: #66ccff;
      --scrollbar-thumb: #666;
      --scrollbar-thumb-hover: #777;
      --scrollbar-thumb-active: #555;
      --font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-weight: 500;
      --font-weight-bold: 700;
    }

    :root {
      background-color: var(--bg-color);
      font-family: var(--font-family);
      font-weight: var(--font-weight);
    }

    ::-webkit-scrollbar {
      background-color: var(--bg-color);
    }

    ::-webkit-scrollbar-thumb {
      background-color: var(--scrollbar-thumb);
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: var(--scrollbar-thumb-hover);
    }

    ::-webkit-scrollbar-thumb:active {
      background-color: var(--scrollbar-thumb-active);
    }

    * {
      box-sizing: border-box;
      font-weight: 500;
    }

    body {
      position: relative;
      overflow-x: hidden;
      font-weight: 500;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
    }

    img {
      max-width: 100%;
    }

    .blueprint-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -100;
      background: linear-gradient(90deg, #12181c11 10px, transparent 10px), linear-gradient(#12181c11 10px, transparent 10px);
      background-size: 50px 50px;
      animation: blueprintMove 20s linear infinite;
    }

    @keyframes blueprintMove {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 50px 50px;
      }
    }

    .slogan {
      color: #fff;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 70px;
      font-weight: bold;
      text-shadow: 10px 10px 20px #111;
      white-space: nowrap;
      display: inline-block;
      animation: blink-caret 0.75s step-end infinite;
      overflow: hidden;
      will-change: width;
      transition: width 1.6s cubic-bezier(0.76, 0, 0.42, 0.99), border-right 0.3s ease;
    }

    .slogan span {
      display: inline-block;
    }

    .slogan.typing-done {
      border-right: none;
    }

    @keyframes blink-caret {

      from,
      to {
        border-color: transparent;
      }

      50% {
        border-color: #0099ff;
      }
    }

    .tab {
      display: flex;
      position: fixed;
      background-color: rgba(34, 34, 34, 0.9);
      width: 100%;
      margin: 0;
      left: 0;
      top: 0;
      height: 60px;
      padding: 10px 0;
      justify-content: space-between;
      z-index: 1000;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .page {
      position: relative;
      min-height: calc(100vh - 60px);
      padding-top: 60px;
      animation: fadeIn 0.4s ease-out;
      width: 100%;
      overflow-x: hidden;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #tabLogo {
      height: 40px;
      margin-top: auto;
      margin-bottom: auto;
      margin-left: 30px;
    }

    .tabButtonTab {
      margin-top: auto;
      margin-bottom: auto;
      margin-right: 40px;
      height: 100%;
    }

    .tabButton {
      background-color: #00000000;
      color: #eee;
      border: 0;
      height: 100%;
      width: 50px;
      border-radius: 10px;
      transition: background-color 0.3s ease;
      text-decoration: none;
    }

    .tabButton:hover {
      background-color: #333;
    }

    .tabButton a {
      text-decoration: none;
      color: #eee;
    }

    .proxy-selector {
      position: relative;
      display: inline-block;
      height: 100%;
    }

    .proxy-btn {
      background-color: #00000000;
      color: #eee;
      border: 0;
      height: 100%;
      padding: 0 15px;
      border-radius: 10px;
      transition: background-color 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .proxy-btn:hover {
      background-color: #333;
    }

    .proxy-label {
      font-size: 14px;
    }

    .proxy-arrow {
      font-size: 10px;
      transition: transform 0.3s ease;
    }

    .proxy-menu {
      display: none;
      position: absolute;
      top: calc(100% + 5px);
      right: 0;
      background: rgba(35,35,35,0.98);
      backdrop-filter: blur(15px);
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border-radius: 10px;
      z-index: 1000;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px);
      transition: all 0.2s ease;
    }

    .proxy-menu.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .proxy-option {
      padding: 11px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ddd;
      font-size: 13px;
      border-left: 3px solid transparent;
    }

    .proxy-option:hover {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-left-color: #0099ff;
    }

    .proxy-option.active {
      background: rgba(0,153,255,0.12);
      color: #0099ff;
      border-left-color: #0099ff;
    }

    .proxy-option .check {
      color: #0099ff;
      font-weight: bold;
      font-size: 11px;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background-color: #222;
      min-width: 120px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      z-index: 1001;
      overflow: hidden;
    }

    .dropdown-content a {
      color: #eee;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      transition: background-color 0.3s ease;
    }

    .dropdown-content a:hover {
      background-color: #333;
    }

    .dropdown.show .dropdown-content {
      display: block;
    }

    .download-section {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px;
      min-height: calc(100vh - 60px);
    }

    .download-title {
      color: #eee;
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 50px;
      text-align: center;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .download-cards {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 1000px;
    }

    .download-card {
      background-color: #222;
      border-radius: 15px;
      padding: 40px 50px;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .download-card:hover {
      transform: translateY(-10px);
      background-color: #2a2a2a;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    }

    .download-name {
      color: #eee;
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 10px;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .download-desc {
      color: #aaa;
      font-size: 0.9rem;
      text-align: center;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .download-panel {
      visibility: hidden;
      opacity: 0;
      max-height: 0;
      width: 100%;
      background: linear-gradient(180deg, rgba(20,20,20,0.98) 0%, rgba(30,30,30,0.98) 100%);
      backdrop-filter: blur(20px);
      padding: 0 0;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      overflow: hidden;
      transition: visibility 0.25s ease, opacity 0.25s ease, max-height 0.25s ease, padding 0.25s ease;
    }

    .download-panel.show {
      visibility: visible;
      opacity: 1;
      max-height: 500px;
      padding: 15px 0;
    }

    .download-panel-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .download-panel-title {
      color: #888;
      font-size: 12px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .download-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .download-item {

      border-radius: 8px;
      padding: 15px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .download-item:hover {
      background: rgba(0,153,255,0.15);
      border-color: #0099ff;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,153,255,0.2);

    .download-item-name {
      color: #ddd;

    .download-item:hover .download-item-name {

    .download-item-size {

  <style>
    .loading {
      position: fixed;
      display: flex;
      flex-direction: column;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: #f7f7f7;
      z-index: 100000000;
      transition: 1s ease;
      justify-content: center;
      align-items: center;
    }

    .loading svg {
      width: 5rem;
      margin-bottom: 2rem;
      overflow: visible;
      transition: 0.3s ease;
    }

    .loading svg circle {
      fill: none;
      stroke: #171717;
      stroke-width: 12;
      stroke-dasharray: 160;
      stroke-dashoffset: 160;
      transform-origin: center;
      animation: circle_rotate 3s ease-in infinite;
    }

    @keyframes circle_rotate {
      0% {
        transform: rotate(0deg);
        stroke-dashoffset: 160;
      }
      100% {
        transform: rotate(360deg);
        stroke-dashoffset: -160;
      }
    }

    .loading p {
      font-family: sans-serif;
      font-size: 2rem;
      color: #171717;
      font-weight: 900;
      transition: 0.3s ease;
    }

    .loading_out {
      transform: translateY(100%);
    }

    .loading_out svg,
    .loading_out p {
      opacity: 0;
    }

    .pointer {
      --width: 2.5rem;
      --height: 2.5rem;
      position: fixed;
      top: calc(var(--height) / -2);
      left: calc(var(--width) / -2);
      width: var(--width);
      height: var(--height);
      transition: all 0.18s ease-out;
      pointer-events: none;
      z-index: 9999;
    }

    .pointer div {
      position: absolute;
      width: 0.6rem;
      height: 0.6rem;
      border-width: 0.2rem;
      border-color: #0099ff;
    }

    .pointer div:nth-child(1) {
      top: 0;
      left: 0;
      border-top-style: solid;
      border-left-style: solid;
    }

    .pointer div:nth-child(2) {
      top: 0;
      right: 0;
      border-top-style: solid;
      border-right-style: solid;
    }

    .pointer div:nth-child(3) {
      bottom: 0;
      left: 0;
      border-bottom-style: solid;
      border-left-style: solid;
    }

    .pointer div:nth-child(4) {
      bottom: 0;
      right: 0;
      border-bottom-style: solid;
      border-right-style: solid;
    }
  </style>

<script>
  const pointer = {
    container: document.querySelector(".pointer"),
    current_target: null,
    init() {
      window.addEventListener("mousemove", this.move.bind(this));
      this.bind_targets_events();
    },
    move(e) {
      let x = e.clientX;
      let y = e.clientY;
      if (this.current_target) {
        const rect = this.current_target.getBoundingClientRect();
        const center_x = rect.left + rect.width / 2;
        const center_y = rect.top + rect.height / 2;
        x = center_x + (x - center_x) * 0.3;
        y = center_y + (y - center_y) * 0.3;
      }
      this.container.style.transform = `translate(${x}px, ${y}px)`;
    },
    bind_targets_events() {
      const targets = document.querySelectorAll("a, button, .featureCard, .OnlineButton, .DesktopButton, .tabButton, .download-card");
      targets.forEach(ele => {
        ele.classList.add("magnetic-target");
        ele.onmouseenter = () => {
          this.current_target = ele;
          const rect = ele.getBoundingClientRect();
          this.container.style.setProperty("--width", rect.width + innerWidth / 50 + "px");
          this.container.style.setProperty("--height", rect.height + innerWidth / 50 + "px");
        };
        ele.onmouseleave = () => {
          this.current_target = null;
          this.container.style.setProperty("--width", "2.5rem");
          this.container.style.setProperty("--height", "2.5rem");
        };
      });
    }
  };

  function initPointer() {
    pointer.init();
  }

  function toggleDropdown() {
    document.querySelector('.dropdown').classList.toggle('show');
  }

  let downloadData = {
    windows: [],
    macos: [],
    linux: [],
    source: []
  };

  let currentPlatform = 'windows';

  function switchPlatform(key) {
    const panel = document.getElementById('download-panel');
    const cardNames = { windows: 'Windows', macos: 'macOS', linux: 'Linux', source: '源码' };
    const assets = downloadData[key] || [];
    const title = document.getElementById('download-panel-title');
    const items = document.getElementById('download-items');

    if (currentPlatform === key && panel.classList.contains('show')) {
      panel.classList.remove('show');
      return;
    }

    document.querySelectorAll('.download-card').forEach(el => el.classList.remove('active'));
    document.querySelector(`.download-card[onclick="switchPlatform('${key}')"]`).classList.add('active');

    title.textContent = cardNames[key] + ' 下载';

    let itemsHtml = '';
    assets.forEach(asset => {
      itemsHtml += `<div class="download-item" onclick="animateToPage('${asset.proxied_url}')">`;
      itemsHtml += `<span class="download-item-name">${asset.name}</span>`;
      itemsHtml += '</div>';
    });
    items.innerHTML = itemsHtml;
    currentPlatform = key;
    panel.classList.add('show');
  }

  function hideDownloadPanel() {
    const panel = document.getElementById('download-panel');
    if (panel) {
      panel.classList.remove('show');
    }
  }

  const proxyList = [
    { name: 'allorigins', prefix: 'https://api.allorigins.win/raw?url=' },
    { name: 'moeyy', prefix: 'https://github.moeyy.cn/' },
    { name: 'ghproxy', prefix: 'https://ghproxy.net/' },
    { name: 'g.ioiox', prefix: 'https://g.ioiox.com/' },
    { name: '直连', prefix: '' }
  ];

  let currentProxy = localStorage.getItem('selectedProxy') || '代理1';
  if (!proxyList.find(p => p.name === currentProxy)) {
    currentProxy = 'ghproxy';
  }

  function initProxyMenu() {
    const menu = document.getElementById('proxy-menu');
    menu.innerHTML = '';
    proxyList.forEach(proxy => {
      const option = document.createElement('div');
      option.className = 'proxy-option' + (proxy.name === currentProxy ? ' active' : '');
      option.onclick = () => selectProxy(proxy.name);
      option.innerHTML = `
        <span>${proxy.name}</span>
        ${proxy.name === currentProxy ? '<span class="check">✓</span>' : ''}
      `;
      menu.appendChild(option);
    });
  }

  function toggleProxyMenu() {
    const menu = document.getElementById('proxy-menu');
    menu.classList.toggle('show');
  }

  function selectProxy(proxyName) {
    currentProxy = proxyName;
    localStorage.setItem('selectedProxy', proxyName);
    initProxyMenu();
    loadDownloadsWithProxy();
    toggleProxyMenu();
  }

  function getProxyPrefix() {
    const proxy = proxyList.find(p => p.name === currentProxy);
    return proxy ? proxy.prefix : proxyList[0].prefix;
  }

  async function loadDownloadsWithProxy() {
    try {
      const response = await fetch('public/releases.json');
      const data = await response.json();

      if (!data.hasRelease || !data.release) {
        document.getElementById('download-cards').innerHTML = '<p style="color:#888;text-align:center;">暂无下载资源</p>';
        return;
      }

      const proxyPrefix = getProxyPrefix();
      const categorized = {
        windows: [],
        macos: [],
        linux: [],
        source: []
      };

      data.release.assets.forEach(asset => {
        const name = asset.name.toLowerCase();
        const proxiedUrl = proxyPrefix ? proxyPrefix + asset.original_url : asset.original_url;
        const assetWithProxy = { ...asset, proxied_url: proxiedUrl };
        if (name.includes('.exe') || name.includes('windows')) {
          categorized.windows.push(assetWithProxy);
        } else if (name.includes('.dmg') || name.includes('macos')) {
          categorized.macos.push(assetWithProxy);
        } else if (name.includes('.appimage') || name.includes('.deb') || name.includes('.rpm') || name.includes('.tar.gz') || name.includes('linux')) {
          categorized.linux.push(assetWithProxy);
        } else if (name.includes('source') || name.includes('源码')) {
          categorized.source.push(assetWithProxy);
        }
      });

      downloadData = categorized;

      const cards = [
        { key: 'windows', name: 'Windows', assets: categorized.windows },
        { key: 'macos', name: 'macOS', assets: categorized.macos },
        { key: 'linux', name: 'Linux', assets: categorized.linux },
        { key: 'source', name: '源码', assets: categorized.source }
      ];

      let html = '';
      let delay = 0.1;
      cards.forEach(card => {
        if (card.assets.length > 0) {
          const isActive = card.key === 'windows' ? ' active' : '';
          html += `<div class="download-card fade-in-up magnetic-target${isActive}" style="animation-delay: ${delay}s" onclick="switchPlatform('${card.key}')">`;
          html += `<div class="download-name">${card.name}</div>`;
          html += '</div>';
          delay += 0.1;
        }
      });

      html += `<div class="download-panel" id="download-panel">`;
      html += `<div class="download-panel-inner">`;
      html += `<div class="download-panel-title" id="download-panel-title">Windows 下载</div>`;
      html += `<div class="download-items" id="download-items"></div>`;
      html += '</div></div>';

      document.getElementById('download-cards').innerHTML = html;

      if (typeof initPointer === 'function') {
        initPointer();
      }
    } catch (err) {
      console.error('加载下载数据失败:', err);
      document.getElementById('download-cards').innerHTML = '<p style="color:#888;text-align:center;">加载失败，请刷新重试</p>';
    }
  }

  const bubbleSettings = {
    count: 25,
    minSize: 30,
    maxSize: 80,
    maxSpeed: 2.0,
    damping: 0.998,
    scrollInfluence: 0.5,
    colors: ['#66ccff', '#88ddff', '#aaeeff', '#99ddff', '#77bbff']
  };

  let bubbles = [];
  let animationId = null;
  let lastFrameTime = 0;
  const targetFPS = 60;
  const frameInterval = 1000 / targetFPS;
  let scrollVelocityX = 0;
  let scrollVelocityY = 0;
  let lastScrollX = 0;
  let lastScrollY = 0;
  let mouseX = -1000;
  let mouseY = -1000;

  function handleScroll() {
    scrollVelocityX = (window.scrollX - lastScrollX) * 0.1;
    scrollVelocityY = (window.scrollY - lastScrollY) * 0.1;
    lastScrollX = window.scrollX;
    lastScrollY = window.scrollY;
  }

  function handleMouseMove(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  }

  window.addEventListener('scroll', handleScroll, { passive: true });
  window.addEventListener('mousemove', handleMouseMove);

  function createBubble() {
    const container = document.getElementById('bubbles-container');
    if (!container) return null;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const size = bubbleSettings.minSize + Math.random() * (bubbleSettings.maxSize - bubbleSettings.minSize);
    const x = Math.random() * (window.innerWidth - size);
    const y = Math.random() * (window.innerHeight - size);

    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = x + 'px';
    bubble.style.top = y + 'px';
    bubble.style.background = `radial-gradient(circle at 30% 30%, ${bubbleSettings.colors[Math.floor(Math.random() * bubbleSettings.colors.length)]}88, ${bubbleSettings.colors[Math.floor(Math.random() * bubbleSettings.colors.length)]}44)`;

    const bubbleData = {
      element: bubble,
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * bubbleSettings.maxSpeed * 4,
      vy: (Math.random() - 0.5) * bubbleSettings.maxSpeed * 4,
      size: size,
      opacity: 0.6 + Math.random() * 0.4
    };

    bubble.addEventListener('click', () => popBubble(bubbleData));
    container.appendChild(bubble);

    return bubbleData;
  }

  function popBubble(bubbleData) {
    if (!bubbleData.element.parentNode) return;
    bubbleData.element.classList.add('popping');
    setTimeout(() => {
      if (bubbleData.element.parentNode) {
        bubbleData.element.parentNode.removeChild(bubbleData.element);
      }
      const index = bubbles.indexOf(bubbleData);
      if (index > -1) bubbles.splice(index, 1);

      setTimeout(() => {
        if (bubbles.length < bubbleSettings.count) {
          bubbles.push(createBubble());
        }
      }, 500);
    }, 300);
  }

  function updateBubbles(timestamp) {
    if (!lastFrameTime) lastFrameTime = timestamp;
    const elapsed = timestamp - lastFrameTime;
    if (elapsed < frameInterval) {
      animationId = requestAnimationFrame(updateBubbles);
      return;
    }
    lastFrameTime = timestamp - (elapsed % frameInterval);

    const container = document.getElementById('bubbles-container');
    if (!container) return;

    container.style.position = 'fixed';
    container.style.top = '0';
    container.style.left = '0';
    container.style.right = '0';
    container.style.bottom = '0';

    scrollVelocityX *= 0.95;
    scrollVelocityY *= 0.95;

    bubbles.forEach(b => {
      const bubbleCenterX = b.x + b.size / 2;
      const bubbleCenterY = b.y + b.size / 2;
      const dx = bubbleCenterX - mouseX;
      const dy = bubbleCenterY - mouseY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const repelRadius = b.size * 3;

      if (distance < repelRadius && distance > 0) {
        const force = (repelRadius - distance) / repelRadius * 0.8;
        b.vx += (dx / distance) * force;
        b.vy += (dy / distance) * force;
      }

      b.vx *= bubbleSettings.damping;
      b.vy *= bubbleSettings.damping;

      b.vx += scrollVelocityX * bubbleSettings.scrollInfluence;
      b.vy += scrollVelocityY * bubbleSettings.scrollInfluence;

      if (Math.abs(b.vx) < 0.02) b.vx += (Math.random() - 0.5) * 0.05;
      if (Math.abs(b.vy) < 0.02) b.vy += (Math.random() - 0.5) * 0.05;

      const maxSpeed = bubbleSettings.maxSpeed;
      if (Math.abs(b.vx) > maxSpeed) b.vx = Math.sign(b.vx) * maxSpeed;
      if (Math.abs(b.vy) > maxSpeed) b.vy = Math.sign(b.vy) * maxSpeed;

      b.x += b.vx;
      b.y += b.vy;

      if (b.x < -b.size * 2) b.x = window.innerWidth + b.size;
      if (b.x > window.innerWidth + b.size * 2) b.x = -b.size;
      if (b.y < -b.size * 2) b.y = window.innerHeight + b.size;
      if (b.y > window.innerHeight + b.size * 2) b.y = -b.size;

      b.element.style.left = b.x + 'px';
      b.element.style.top = b.y + 'px';
    });

    animationId = requestAnimationFrame(updateBubbles);
  }

  function initBubbles() {
    const container = document.getElementById('bubbles-container');
    if (!container) return;

    if (animationId) cancelAnimationFrame(animationId);
    container.innerHTML = '';
    bubbles = [];

    for (let i = 0; i < bubbleSettings.count; i++) {
      const b = createBubble();
      if (b) {
        b.x = Math.random() * (window.innerWidth - b.size);
        b.y = Math.random() * (window.innerHeight - b.size);
        b.element.style.left = b.x + 'px';
        b.element.style.top = b.y + 'px';
        bubbles.push(b);
      }
    }

    updateBubbles();
  }

  document.addEventListener('DOMContentLoaded', function() {
    initProxyMenu();
    loadDownloadsWithProxy();
    initBubbles();
  });

  document.addEventListener('click', function(event) {
    if (!event.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown.show').forEach(el => el.classList.remove('show'));
    }
    if (!event.target.closest('.proxy-selector')) {
      document.querySelectorAll('.proxy-menu.show').forEach(el => el.classList.remove('show'));
    }
    if (!event.target.closest('.download-card') && !event.target.closest('.download-panel')) {
      hideDownloadPanel();
    }
  });

  function animateToPage(url) {
    const loadingContainer = document.querySelector(".loading");
    loadingContainer.classList.remove("loading_out");
    setTimeout(() => {
      window.location.href = url;
    }, 1000);
  }

  window.addEventListener("load", () => {
    const loadingContainer = document.querySelector(".loading");
    loadingContainer.classList.add("loading_out");
  });
</script>

</html>
